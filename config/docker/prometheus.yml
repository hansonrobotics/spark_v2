global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'spark-api'
    static_configs:
      - targets: ['spark-api:8000']
  - job_name: 'spark-kg'
    static_configs:
      - targets: ['spark-kg:8001']
  - job_name: 'spark-htn'
    static_configs:
      - targets: ['spark-htn:8002']
  - job_name: 'spark-story'
    static_configs:
      - targets: ['spark-story:8003']
  - job_name: 'spark-robot'
    static_configs:
      - targets: ['spark-robot:8006']
  - job_name: 'spark-autoresearch'
    static_configs:
      - targets: ['spark-autoresearch:8007']
